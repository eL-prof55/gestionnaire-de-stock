name: verification php
on:
  push:
    branches: [main,develop]
  pull_request:
    branches: [main,develop]

jobs:
  php-check:
    runs-on: ubuntu-latest
    steps:
      -uses: actions/checkout@v3
      -name: setup php
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
      -name: verifier synthaxe php
      run: find . -name "*.php" -exec php -l {} \;